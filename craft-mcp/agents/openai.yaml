interface:
  display_name: "Craft MCP"
  short_description: "通过 Craft MCP 管理笔记、ARR 分类文档与范围检索"
  default_prompt: "使用 $craft-mcp 在 Craft 中处理 arr笔记或在指定文件夹、文档、日期范围内检索并更新内容。"

dependencies:
  tools:
    - type: "mcp"
      value: "craft"
      description: "Craft MCP server（需在宿主应用中配置）"
      transport: "streamable_http"
      url: "https://mcp.craft.do/links/xxx/mcp"

policy:
  allow_implicit_invocation: true
